---
layout: default
title: Suggest a tool or an edit
permalink: /contribute/
---

<header>
  <h1 class="site-title">Suggest a tool or an edit</h1>
  <p class="site-subtitle">Know something that should be listed, or spot something wrong? Tell us.</p>
</header>

<form class="suggest-form" action="https://formspree.io/f/mwvjjkay" method="POST">
  <div class="field">
    <label for="tool-name">Tool name</label>
    <input id="tool-name" type="text" name="tool_name" required autocomplete="off">
    <div id="tool-hint" class="tool-hint"></div>
  </div>

  <div class="field">
    <label for="tool-url">URL</label>
    <input id="tool-url" type="url" name="tool_url" placeholder="https://" required autocomplete="off">
  </div>

  <div class="field">
    <label for="tool-desc">What does it do?</label>
    <textarea id="tool-desc" name="description" rows="4" placeholder="One or two sentences. What it does, not why it matters."></textarea>
  </div>

  <div class="field">
    <label for="contact">Your email or GitHub username <span class="optional">(optional)</span></label>
    <input id="contact" type="text" name="contact" autocomplete="off">
  </div>

  <button type="submit" class="submit-btn">Submit</button>
</form>

<script>
  const existingTools = [
    {% for cat in site.data.categories %}
    {% assign cat_tools = site.data.tools[cat.id] %}
    {% for tool in cat_tools %}
    { name: {{ tool.name | jsonify }}, url: {{ tool.url | jsonify }} },
    {% endfor %}
    {% endfor %}
  ];

  const nameInput = document.getElementById('tool-name');
  const hint = document.getElementById('tool-hint');

  nameInput.addEventListener('input', () => {
    const q = nameInput.value.trim().toLowerCase();
    if (q.length < 2) { hint.innerHTML = ''; return; }
    const match = existingTools.find(t => t.name.toLowerCase().includes(q));
    if (match) {
      hint.innerHTML = 'ℹ️ <strong>' + match.name + '</strong> is already listed — <a href="{{ '/' | relative_url }}">see it in the directory</a>.';
    } else {
      hint.innerHTML = '';
    }
  });
</script>

<footer class="footer">
  <a href="{{ '/' | relative_url }}">← Back to directory</a>
</footer>
