name: Formspree → GitHub Issue

on:
  repository_dispatch:
    types: [formspree-submission]

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'suggestion', color: '0075ca', description: 'Suggested new tool via the contribute form' },
              { name: 'edit',       color: 'e4e669', description: 'Flagged edit or correction via the contribute form' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
              } catch (e) {
                if (e.status !== 422) throw e; // 422 = label already exists
              }
            }

      - name: Create issue from submission
        uses: actions/github-script@v7
        with:
          script: |
            const p = context.payload.client_payload;

            const isEdit   = (p.type || '').trim().toLowerCase() === 'flag';
            const prefix   = isEdit ? '[Edit]'    : '[Suggest]';
            const label    = isEdit ? 'edit'      : 'suggestion';
            const toolName = (p.tool_name || '').trim() || 'Unknown';

            const body = [
              `| Field | Value |`,
              `|---|---|`,
              `| Type | ${isEdit ? 'Flag an edit' : 'Suggest a tool'} |`,
              `| Tool name | ${toolName} |`,
              `| URL | ${p.tool_url ? `[${p.tool_url}](${p.tool_url})` : '—'} |`,
              `| Description | ${(p.description || '—').replace(/\n/g, ' ')} |`,
              `| Contact | ${p.contact || '—'} |`,
              ``,
              `*Submitted via [openmritools.com/contribute](https://openmritools.com/contribute)*`,
            ].join('\n');

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `${prefix} ${toolName}`,
              body,
              labels: [label],
            });
