# Quality Control tools
# Fields:
#   name:        display name
#   description: one sentence — what it does, not why it matters
#   url:         homepage or repo
#   github:      owner/repo  (required for health checks)
#   language:    primary implementation language

- name: MRIQC
  description: Extracts image quality metrics from structural and functional MRI and produces visual reports.
  url: https://github.com/nipreps/mriqc
  github: nipreps/mriqc
  language: Python

- name: mrQA
  description: Checks BIDS datasets for protocol compliance and flags deviations in acquisition parameters.
  url: https://github.com/Open-MRI-Collective/mrQA
  github: Open-MRI-Collective/mrQA
  language: Python
