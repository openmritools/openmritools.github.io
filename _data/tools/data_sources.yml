# Resources & Data
# Fields:
#   name:        display name
#   description: one sentence — what it does, not why it matters
#   url:         homepage
#   github:      owner/repo  (omit for data repositories without a meaningful GitHub presence)

- name: OpenNeuro
  description: Free platform for sharing and downloading BIDS-formatted neuroimaging datasets; over 1,000 public datasets.
  url: https://openneuro.org
  github: OpenNeuroOrg/openneuro

- name: NeuroVault
  description: Repository for sharing unthresholded statistical brain maps from published studies.
  url: https://neurovault.org

- name: NeuroBagel
  description: Federated search across neuroimaging datasets using semantic annotations and a common data model.
  url: https://github.com/neurobagel
  github: neurobagel/bagel-cli

- name: Human Connectome Project
  description: High-resolution structural, functional, and diffusion MRI from 1,200 healthy adults.
  url: https://www.humanconnectome.org

- name: ADNI
  description: Longitudinal MRI and PET data from participants across the Alzheimer's disease spectrum.
  url: https://adni.loni.usc.edu

- name: OASIS
  description: Cross-sectional and longitudinal structural brain MRI datasets for aging and dementia research.
  url: https://www.oasis-brains.org

- name: IXI
  description: Around 600 structural MRI scans from healthy subjects collected at three London hospitals.
  url: https://brain-development.org/ixi-dataset

- name: ABCD
  description: Longitudinal brain imaging study tracking 10,000+ adolescents across the US.
  url: https://abcdstudy.org

- name: UK Biobank
  description: Population-level brain imaging from 100,000+ UK participants; access requires application.
  url: https://www.ukbiobank.ac.uk

- name: NeuroStars
  description: Q&A forum for neuroinformatics, neuroimaging methods, and tool support.
  url: https://neurostars.org

- name: OSF
  description: Preregister studies, share data, code, and materials, and get DOIs; the central platform for open science.
  url: https://osf.io

- name: AsPredicted
  description: Quick, lightweight preregistration for studies — fill in nine questions and lock your hypotheses before data collection.
  url: https://aspredicted.org

- name: protocols.io
  description: Share and discover step-by-step research protocols with versioning and DOI assignment.
  url: https://www.protocols.io

- name: bioRxiv
  description: Preprint server for biology and neuroscience; post before peer review to share findings early.
  url: https://www.biorxiv.org

- name: NeuroLibre
  description: Reproducible neuroscience preprints with live, executable code and data embedded in the publication.
  url: https://neurolibre.org

- name: Zenodo
  description: Archive code, data, or posters and receive a citable DOI; integrates directly with GitHub releases.
  url: https://zenodo.org

- name: PROSPERO
  description: International registry for preregistering systematic reviews and meta-analyses before they begin.
  url: https://www.crd.york.ac.uk/prospero

- name: ENIGMA
  description: Global consortium for large-scale neuroimaging genetics meta-analyses spanning 45+ working groups and countries.
  url: https://enigma.ini.usc.edu

- name: ENIGMA Protocols
  description: Standardized imaging protocols for cortical, subcortical, DTI, and VBM analysis used across ENIGMA working groups.
  url: https://enigma.ini.usc.edu/protocols/imaging-protocols
