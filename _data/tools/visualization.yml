# Visualization tools
# Fields:
#   name:        display name
#   description: one sentence — what it does, not why it matters
#   url:         homepage or repo
#   github:      owner/repo  (required for health checks)
#   language:    primary implementation language

- name: FSLeyes
  description: MRI image viewer from the FSL team; supports most neuroimaging file formats including NIfTI and CIFTI.
  url: https://github.com/pauldmccarthy/fsleyes
  github: pauldmccarthy/fsleyes
  language: Python

- name: wb_view
  description: Connectome Workbench viewer for surface and volume neuroimaging data, especially HCP-style CIFTI files.
  url: https://github.com/Washington-University/workbench
  github: Washington-University/workbench
  language: C++

- name: Nilearn plotting
  description: Python functions for plotting brain maps, glass brains, and statistical overlays on MRI templates.
  url: https://github.com/nilearn/nilearn
  github: nilearn/nilearn
  language: Python
