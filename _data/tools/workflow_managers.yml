# Workflow Managers
# Fields:
#   name:        display name
#   description: one sentence — what it does, not why it matters
#   url:         homepage or repo
#   github:      owner/repo  (required for health checks)
#   language:    primary implementation language

- name: Nipoppy
  description: Manages the full neuroimaging workflow from raw data through BIDS conversion, pipeline execution, and derivative extraction.
  url: https://github.com/nipoppy/nipoppy
  github: nipoppy/nipoppy
  language: Python
  date_added: 2026-06-16
  modality: multi

- name: Nipype
  description: Pipeline framework wrapping FSL, SPM, FreeSurfer, and others into reproducible Python workflows.
  url: https://github.com/nipy/nipype
  github: nipy/nipype
  language: Python
  date_added: 2026-06-16
  modality: multi

- name: Brainlife.io
  description: Free cloud platform for running containerized neuroimaging pipelines with provenance tracking.
  url: https://brainlife.io
  language: Web
  date_added: 2026-06-16

- name: Neurodesk
  description: Containerized neuroimaging desktop environment with 100+ analysis tools, accessible via browser.
  url: https://github.com/NeuroDesk/neurodesktop
  github: NeuroDesk/neurodesktop
  language: Docker
  date_added: 2026-06-16
  modality: multi

- name: DataLad
  description: Distributed data management system for version-controlled datasets and reproducible analyses.
  url: https://github.com/datalad/datalad
  github: datalad/datalad
  language: Python
  date_added: 2026-06-16
  modality: multi

- name: Clinica
  description: Software platform for clinical neuroimaging studies, with standardized pipelines for structural, diffusion, and PET data.
  url: https://aramislab.paris.inria.fr/clinica/docs/public/latest
  github: aramis-lab/clinica
  language: Python
  date_added: 2026-06-16
  modality: multi

- name: QuNex
  description: Integrative platform for HCP-style processing of structural, functional, and diffusion MRI across large cohorts.
  url: https://qunex.yale.edu
  language: Python
  date_added: 2026-06-16
  modality: multi

- name: Pydra
  description: Next-generation dataflow engine from the NiPype team for building reproducible, scalable neuroimaging workflows.
  url: https://github.com/nipype/pydra
  github: nipype/pydra
  language: Python
  date_added: 2026-06-17
  modality: multi
